name: Deploy GitHub Pages

on:
  workflow_dispatch:
    inputs:
      base_path:
        description: 'Repository base path, for example /landing. Leave empty for username.github.io.'
        required: false
        default: ''
  push:
    branches:
      - main

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: false

jobs:
  build:
    runs-on: ubuntu-latest
    env:
      GITHUB_PAGES: 'true'
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 24
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Configure base path
        shell: bash
        run: |
          if [ -n "${{ github.event.inputs.base_path }}" ]; then
            echo "NEXT_PUBLIC_BASE_PATH=${{ github.event.inputs.base_path }}" >> "$GITHUB_ENV"
          elif [[ "${{ github.event.repository.name }}" == *.github.io ]]; then
            echo "NEXT_PUBLIC_BASE_PATH=" >> "$GITHUB_ENV"
          else
            echo "NEXT_PUBLIC_BASE_PATH=/${{ github.event.repository.name }}" >> "$GITHUB_ENV"
          fi

      - name: Build static site
        run: npm run build:pages

      - name: Upload artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: out

  deploy:
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - name: Deploy
        id: deployment
        uses: actions/deploy-pages@v4
